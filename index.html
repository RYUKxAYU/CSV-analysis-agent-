<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV AI Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
            font-size: 1rem;
        }
        
        .card {
            background: #1e1e2f;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .card h2 {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .upload-area {
            border: 2px dashed #444;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .upload-area:hover {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.1);
        }
        
        .upload-area input {
            display: none;
        }
        
        .upload-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        
        .upload-text {
            color: #aaa;
        }
        
        .file-name {
            color: #4ade80;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #333;
            border-radius: 10px;
            background: #2a2a3e;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }
        
        input[type="text"]:focus {
            border-color: #6366f1;
        }
        
        input[type="text"]::placeholder {
            color: #666;
        }
        
        button {
            padding: 14px 28px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        button:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }
        
        button:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
        }
        
        .chat-container {
            max-height: 500px;
            overflow-y: auto;
        }
        
        .message {
            margin-bottom: 16px;
            padding: 16px;
            border-radius: 12px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            background: #2d2d4a;
            margin-left: 40px;
        }
        
        .message.ai {
            background: #1a1a2e;
            margin-right: 40px;
        }
        
        .message-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .message.user .message-label {
            color: #a78bfa;
        }
        
        .message.ai .message-label {
            color: #4ade80;
        }
        
        .message-content {
            color: #ddd;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .loading {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #888;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        
        .empty-state {
            text-align: center;
            color: #555;
            padding: 40px;
        }
        
        .empty-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 CSV AI Agent</h1>
            <p class="subtitle">Chat with your CSV data using AI</p>
        </header>
        
        <div class="card">
            <h2>📁 Upload Data</h2>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📄</div>
                <div class="upload-text">Drop your CSV file here or click to browse</div>
                <input type="file" id="fileInput" accept=".csv">
                <div class="file-name" id="fileName"></div>
            </div>
        </div>
        
        <div class="card">
            <h2>💬 Ask Questions</h2>
            <div class="input-group">
                <input type="text" id="questionInput" placeholder="Ask a question about your CSV...">
                <button id="sendBtn">Send</button>
            </div>
            
            <div id="errorContainer"></div>
            
            <div class="chat-container" id="chatContainer">
                <div class="empty-state">
                    <div class="empty-icon">💭</div>
                    <p>Ask a question to get started</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = '';
        
        // Get base URL (works for both local and production)
        const BASE_URL = window.location.origin;
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const questionInput = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatContainer = document.getElementById('chatContainer');
        const errorContainer = document.getElementById('errorContainer');
        
        let uploadedFileName = '';
        
        // File upload handling
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#6366f1';
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '#444';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#444';
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.csv')) {
                handleFileUpload(file);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleFileUpload(file);
            }
        });
        
        function handleFileUpload(file) {
            const formData = new FormData();
            formData.append('file', file);
            
            // Since we're using static hosting, we'll store the filename
            // In a real deployment, you'd upload to a cloud storage
            uploadedFileName = file.name;
            fileName.textContent = `✓ ${file.name}`;
            
            // Add system message about the file
            addMessage('system', `File "${file.name}" is ready for analysis. You can now ask questions about it.`);
        }
        
        // Send message
        async function sendMessage() {
            const question = questionInput.value.trim();
            if (!question) return;
            
            // Add user message
            addMessage('user', question);
            questionInput.value = '';
            
            // Show loading
            showLoading();
            sendBtn.disabled = true;
            
            try {
                const response = await fetch(`${BASE_URL}/ask`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_input: question + (uploadedFileName ? ` (file: ${uploadedFileName})` : '')
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }
                
                const data = await response.json();
                addMessage('ai', data.agent_response);
            } catch (error) {
                showError('Failed to connect to the API. Please make sure the backend is deployed and running.');
            } finally {
                hideLoading();
                sendBtn.disabled = false;
            }
        }
        
        sendBtn.addEventListener('click', sendMessage);
        
        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        function addMessage(role, content) {
            // Remove empty state
            const emptyState = chatContainer.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="message-label">${role === 'user' ? 'You' : 'AI Agent'}</div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        function showLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai loading';
            loadingDiv.id = 'loadingMessage';
            loadingDiv.innerHTML = `
                <div class="spinner"></div>
                <span>Thinking...</span>
            `;
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        function hideLoading() {
            const loading = document.getElementById('loadingMessage');
            if (loading) {
                loading.remove();
            }
        }
        
        function showError(message) {
            errorContainer.innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
            setTimeout(() => {
                errorContainer.innerHTML = '';
            }, 5000);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
